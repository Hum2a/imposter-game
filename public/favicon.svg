<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#ff2020" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGlow)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#ff3030" stroke-width="0.8" opacity="0.4"/>

  <!-- Head -->
  <circle cx="16" cy="11" r="7" fill="#1a1a2e"/>
  <circle cx="16" cy="11" r="7" fill="none" stroke="#ff3030" stroke-width="0.8" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="16" cy="24" rx="8" ry="6.5" fill="#1a1a2e"/>
  <ellipse cx="16" cy="24" rx="8" ry="6.5" fill="none" stroke="#ff3030" stroke-width="0.8" opacity="0.7"/>

  <!-- Eye slit -->
  <ellipse cx="16" cy="11" rx="4" ry="1.5" fill="url(#eyeGlow)" filter="url(#glow)"/>

  <!-- Crack -->
  <line x1="16" y1="4" x2="16" y2="30.5" stroke="url(#crackGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="13" x2="18.5" y2="17" stroke="#ff4444" stroke-width="0.7" opacity="0.7"/>
  <line x1="16" y1="20" x2="13.5" y2="23" stroke="#ff4444" stroke-width="0.7" opacity="0.7"/>
</svg>
