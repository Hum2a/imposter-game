<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0f">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3b3b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff2020" flood-opacity="0.8"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#ff0000" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#0a0a0f"/>

  <!-- Background glow -->
  <ellipse cx="300" cy="150" rx="280" ry="160" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#ff3b3b" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
  </g>

  <!-- Imposter figure (left) with crack -->
  <g transform="translate(72, 30)" filter="url(#shadow)">
    <ellipse cx="0" cy="130" rx="28" ry="38" fill="#1a1a2e"/>
    <ellipse cx="0" cy="130" rx="28" ry="38" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="72" r="26" fill="#1a1a2e"/>
    <circle cx="0" cy="72" r="26" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.7"/>
    <!-- Suspicious glowing eye slit -->
    <ellipse cx="0" cy="72" rx="14" ry="5" fill="#ff3b3b" opacity="0.15"/>
    <ellipse cx="0" cy="72" rx="8" ry="3" fill="url(#eyeGlow)" filter="url(#shadow)"/>
    <!-- Crack down the middle -->
    <line x1="0" y1="46" x2="0" y2="168" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="90" x2="6" y2="105" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="110" x2="-5" y2="122" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Crew figures (right, faded) -->
  <g opacity="0.3">
    <g transform="translate(505, 50)">
      <circle cx="0" cy="30" r="14" fill="#2a2a4a"/>
      <ellipse cx="0" cy="68" rx="16" ry="22" fill="#2a2a4a"/>
    </g>
    <g transform="translate(540, 55)">
      <circle cx="0" cy="30" r="14" fill="#2a2a4a"/>
      <ellipse cx="0" cy="68" rx="16" ry="22" fill="#2a2a4a"/>
    </g>
    <g transform="translate(522, 100)">
      <circle cx="0" cy="30" r="14" fill="#2a2a4a"/>
      <ellipse cx="0" cy="68" rx="16" ry="22" fill="#2a2a4a"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="300"
    y="168"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    letter-spacing="-2"
    fill="#f0f0f0"
    filter="url(#textShadow)"
  >IMPOSTER</text>

  <!-- Slash through the O -->
  <line x1="268" y1="102" x2="282" y2="148" stroke="#ff3030" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>

  <!-- Tagline -->
  <text
    x="300"
    y="196"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="6"
    fill="#ff3b3b"
    opacity="0.8"
  >WHO DO YOU TRUST?</text>

  <!-- Decorative rules -->
  <line x1="100" y1="208" x2="210" y2="208" stroke="#ff3030" stroke-width="0.8" opacity="0.4"/>
  <line x1="390" y1="208" x2="500" y2="208" stroke="#ff3030" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner accents -->
  <polyline points="20,20 20,40 40,40" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.4"/>
  <polyline points="580,20 580,40 560,40" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.4"/>
  <polyline points="20,280 20,260 40,260" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.4"/>
  <polyline points="580,280 580,260 560,260" fill="none" stroke="#ff3030" stroke-width="1.5" opacity="0.4"/>
</svg>
