# Cloudflare Pages — Wrangler 4+ expects `pages_build_output_dir` when this file exists
# (stops the "missing pages_build_output_dir" warning on `wrangler pages deploy`).
#
# The Discord OAuth **Worker** lives in `wrangler.worker.toml`. Deploy it with:
#   npx wrangler deploy -c wrangler.worker.toml
# See `scripts/deploy.mjs` (uses `-c wrangler.worker.toml` for worker + secrets).

pages_build_output_dir = "dist"
