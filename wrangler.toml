# Cloudflare Pages (Wrangler 4+). `name` must match your Pages project in the dashboard
# and should match `CF_PAGES_PROJECT_NAME` in `.env.deploy` (change both if you rename the project).
#
# The Discord OAuth **Worker** lives in `wrangler.worker.toml`:
#   npx wrangler deploy -c wrangler.worker.toml

name = "imposter-game"
pages_build_output_dir = "dist"
