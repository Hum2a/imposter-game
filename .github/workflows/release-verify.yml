# Runs on version tags: lint, build, server tsc, Playwright (PartyKit started like CI).
# Deploy to Cloudflare remains separate (Wrangler/Pages secrets on your account).
name: Release verify

on:
  push:
    tags: ['v*']

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies (client + server)
        run: |
          npm ci
          npm ci --prefix server

      - name: Lint & build client
        env:
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_PARTYKIT_HOST: 127.0.0.1:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: |
          npm run lint
          npm run build

      - name: Typecheck Partykit server
        working-directory: server
        run: npx tsc --noEmit -p .

      - name: Start PartyKit & Playwright
        env:
          CI: true
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_DISCORD_MOCK: '1'
          VITE_PARTYKIT_HOST: 127.0.0.1:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: |
          npm run dev --prefix server &
          npx wait-on tcp:127.0.0.1:1999 -t 120000
          npx playwright install --with-deps chromium
          npm run test:e2e
