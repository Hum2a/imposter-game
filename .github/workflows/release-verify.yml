# Runs on version tags: full lint, build, server tsc, and Playwright smoke.
# Wire GitHub → Cloudflare deploy separately (Wrangler/Pages secrets) when ready.
name: Release verify

on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Client install, lint, build
        env:
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_PARTYKIT_HOST: localhost:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: |
          npm ci
          npm run lint
          npm run build
      - name: Partykit server typecheck
        working-directory: server
        run: |
          npm ci
          npx tsc --noEmit -p .
      - name: Playwright
        env:
          CI: true
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_DISCORD_MOCK: '1'
          VITE_PARTYKIT_HOST: 127.0.0.1:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: |
          npm ci --prefix server
          npm run dev --prefix server &
          npx wait-on tcp:127.0.0.1:1999 -t 120000
          npx playwright install --with-deps chromium
          npm run test:e2e
