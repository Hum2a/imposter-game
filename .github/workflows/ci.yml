name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install & lint & build (client)
        run: |
          npm ci
          npm run lint
          npm run build
      - name: Install & typecheck (Partykit server)
        working-directory: server
        run: |
          npm ci
          npx tsc --noEmit -p .
