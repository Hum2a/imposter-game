name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # GitHub Actions: run checkout/setup-node on Node 24 (Node 20 runner deprecation)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies (client + server)
        run: |
          npm ci
          npm ci --prefix server

      - name: Lint & build client
        env:
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_PARTYKIT_HOST: 127.0.0.1:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: |
          npm run lint
          npm run build

      - name: Typecheck Partykit server
        working-directory: server
        run: npx tsc --noEmit -p .

      - name: Start PartyKit (e2e dependency)
        run: |
          npm run dev --prefix server &
          npx wait-on tcp:127.0.0.1:1999 -t 120000

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          CI: true
          VITE_DISCORD_CLIENT_ID: '0'
          VITE_DISCORD_MOCK: '1'
          VITE_PARTYKIT_HOST: 127.0.0.1:1999
          VITE_DISCORD_TOKEN_URL: https://example.com/api/token
        run: npm run test:e2e
